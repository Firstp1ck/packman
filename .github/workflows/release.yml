name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.1.0); must be an existing tag or ref'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  get-version:
    name: Get version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      release_notes: ${{ steps.version.outputs.release_notes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref }}

      - name: Get version, prerelease flag, and release notes
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            IS_TAG_PUSH="false"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
            IS_TAG_PUSH="true"
          fi
          echo "Release version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          STRIP="${VERSION#v}"
          MAJOR=$(echo "$STRIP" | cut -d. -f1)
          if [ "$MAJOR" -lt 1 ] 2>/dev/null; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          RELEASE_FILE="Release-docs/RELEASE_${VERSION}.md"

          if [ -f "$RELEASE_FILE" ]; then
            echo "Found release notes file: $RELEASE_FILE"
            RELEASE_NOTES=$(tail -n +3 "$RELEASE_FILE")
            DELIMITER="RELEASE_NOTES_$(date +%s)_$$"
            {
              echo "release_notes<<$DELIMITER"
              echo "$RELEASE_NOTES"
              echo "$DELIMITER"
            } >> "$GITHUB_OUTPUT"
          elif [ "$IS_TAG_PUSH" = "true" ]; then
            TAG_TYPE=$(git cat-file -t "$VERSION" 2>/dev/null || echo "")
            if [ "$TAG_TYPE" = "tag" ]; then
              TAG_NOTES=$(git show "$VERSION" --format='%B' --no-patch 2>/dev/null || echo "")
              TAG_NOTES=$(echo "$TAG_NOTES" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
              if [ -n "$TAG_NOTES" ]; then
                echo "Found release notes in tag annotation"
                DELIMITER="RELEASE_NOTES_$(date +%s)_$$"
                {
                  echo "release_notes<<$DELIMITER"
                  echo "$TAG_NOTES"
                  echo "$DELIMITER"
                } >> "$GITHUB_OUTPUT"
              else
                echo "Tag is annotated but has no message, using default"
                DELIMITER="RELEASE_NOTES_$(date +%s)_$$"
                {
                  echo "release_notes<<$DELIMITER"
                  echo "Release $VERSION"
                  echo "$DELIMITER"
                } >> "$GITHUB_OUTPUT"
              fi
            else
              echo "Tag is lightweight (no annotation), using default"
              DELIMITER="RELEASE_NOTES_$(date +%s)_$$"
              {
                echo "release_notes<<$DELIMITER"
                echo "Release $VERSION"
                echo "$DELIMITER"
              } >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Workflow triggered manually and no release file found, using default release notes"
            DELIMITER="RELEASE_NOTES_$(date +%s)_$$"
            {
              echo "release_notes<<$DELIMITER"
              echo "Release $VERSION"
              echo "$DELIMITER"
            } >> "$GITHUB_OUTPUT"
          fi

  build-binaries:
    name: Build (${{ matrix.platform }}-${{ matrix.arch }})
    needs: get-version
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            arch: x86_64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - runner: macos-14
            platform: darwin
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.get-version.outputs.version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libwayland-dev \
            libwayland-client0 \
            libwayland-egl1

      - name: Build Release
        run: cargo build --release

      - name: Stage binary for upload
        run: cp target/release/unipack "unipack-${{ matrix.platform }}-${{ matrix.arch }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: asset-unipack-${{ matrix.platform }}-${{ matrix.arch }}
          path: unipack-${{ matrix.platform }}-${{ matrix.arch }}

  publish-release:
    name: Publish release
    needs: [get-version, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v4
        with:
          pattern: asset-*
          path: release-files
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          set -euo pipefail
          cd release-files
          test -f unipack-linux-x86_64
          test -f unipack-linux-arm64
          test -f unipack-darwin-arm64
          sha256sum \
            unipack-linux-x86_64 \
            unipack-linux-arm64 \
            unipack-darwin-arm64 > SHA256SUMS
          echo "SHA256SUMS:"
          cat SHA256SUMS

      - name: Create release body
        id: release-body
        env:
          RELEASE_NOTES: ${{ needs.get-version.outputs.release_notes }}
        run: |
          printf '%s' "$RELEASE_NOTES" > /tmp/release_body.txt

          DELIMITER="RELEASE_BODY_$(date +%s)_$$"
          {
            echo "body<<$DELIMITER"
            cat /tmp/release_body.txt
            echo ""
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update release and upload assets
        env:
          TAG: ${{ needs.get-version.outputs.version }}
          RELEASE_NAME: Release ${{ needs.get-version.outputs.version }}
          RELEASE_BODY: ${{ steps.release-body.outputs.body }}
          IS_PRERELEASE: ${{ needs.get-version.outputs.prerelease }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          RELEASE_FILES=(
            release-files/unipack-linux-x86_64
            release-files/unipack-linux-arm64
            release-files/unipack-darwin-arm64
            release-files/SHA256SUMS
          )

          for file in "${RELEASE_FILES[@]}"; do
            test -f "$file"
          done

          # Remove duplicate draft releases for this tag before create/update.
          mapfile -t DUPLICATE_DRAFT_IDS < <(
            gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
              --jq ".[] | select(.tag_name == \"${TAG}\" and .draft == true) | .id"
          )
          for release_id in "${DUPLICATE_DRAFT_IDS[@]}"; do
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
          done

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$RELEASE_NAME" \
              --notes "$RELEASE_BODY" \
              $([ "$IS_PRERELEASE" = "true" ] && echo "--prerelease" || echo "--latest")
          else
            gh release create "$TAG" \
              --title "$RELEASE_NAME" \
              --notes "$RELEASE_BODY" \
              $([ "$IS_PRERELEASE" = "true" ] && echo "--prerelease")
          fi

          gh release upload "$TAG" "${RELEASE_FILES[@]}" --clobber
